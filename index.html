<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PostPilot</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <svg width="162" height="30" class="logo">
          <use href="./images/icons.svg#icon-logo"></use>
        </svg>
        <div class="second-container">
          <nav>
            <ul class="navigation-list">
              <li class="navigation-item"><a href="#">Resources</a></li>
              <li class="navigation-item"><a href="#">Success stories</a></li>
              <li class="navigation-item"><a href="#">Company</a></li>
              <li class="navigation-item"><a href="#">Pricing</a></li>
            </ul>
          </nav>
          <div class="container-buttons">
            <button type="button" class="login-button">Login</button>
            <button type="button" class="create-button">
              Create free account
            </button>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="hero-container">
          <div class="left-container">
            <h1 class="title">
              Meet your <br />
              <span class="title-part">favorite</span> new (old) marketing
              channel.
            </h1>
            <p class="text">
              Remarkable results. Easier than email. Postcard marketing
              reinvented for modern ecommerce.
            </p>
            <div class="button-stars-container">
              <button type="button" class="button">Try it Risk-free</button>
              <div class="star-shopify-container">
                <ul class="star-container">
                  <li>
                    <svg width="24" height="24">
                      <use href="./images/icons.svg#icon-star"></use>
                    </svg>
                  </li>
                  <li>
                    <svg width="24" height="24">
                      <use href="./images/icons.svg#icon-star"></use>
                    </svg>
                  </li>
                  <li>
                    <svg width="24" height="24">
                      <use href="./images/icons.svg#icon-star"></use>
                    </svg>
                  </li>
                  <li>
                    <svg width="24" height="24">
                      <use href="./images/icons.svg#icon-star"></use>
                    </svg>
                  </li>
                  <li>
                    <svg width="24" height="24">
                      <use href="./images/icons.svg#icon-star"></use>
                    </svg>
                  </li>
                </ul>
                <p class="shopify-text">5.0 Shopify Rating</p>
              </div>
            </div>
          </div>
          <div class="right-container">
            <img
              src="./images/hero-main.png"
              alt="Hero Main"
              width="680"
              class="hero-main-image"
            />
            <img
              src="./images/hero-overlay.png"
              alt="Hero Overlay"
              width="650"
              class="hero-overlay-image"
            />
          </div>
        </div>
      </section>
      <section class="brands"><div class="container"></div></section>
      <section class="why-use"><div class="container"></div></section>
      <section class="features-qoutes"><div class="container"></div></section>
      <section class="profits"><div class="container"></div></section>
      <section class="fast-result"><div class="container"></div></section>
      <section class="reviews"><div class="container"></div></section>
      <section class="obvi"><div class="container"></div></section>
      <section class="risk-free"><div class="container"></div></section>
      <section class="news"><div class="container"></div></section>
    </main>
    <footer><div class="container"></div></footer>
  </body>
</html>
